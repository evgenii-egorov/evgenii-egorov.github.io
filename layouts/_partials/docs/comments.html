{{ if and (eq .Type "literature") (eq .Kind "page") }}
  <section class="on-side-comments" aria-labelledby="on-side-comments-title">
    <h2 id="on-side-comments-title">Comments</h2>
    <p class="text-small">Comments are powered by GitHub.</p>
    <script src="https://utteranc.es/client.js"
            repo="evgenii-egorov/evgenii-egorov.github.io"
            issue-term="pathname"
            label="O.N. de Side"
            theme="preferred-color-scheme"
            crossorigin="anonymous"
            async>
    </script>
  </section>
{{ end }}
